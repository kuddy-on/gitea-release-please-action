name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Verify committed bundle
        run: git diff --exit-code -- dist

  integration:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - mode: v-prefix
            tag_prefix: v
          - mode: empty-prefix
            tag_prefix: ''
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run ${{ matrix.mode }} integration test
        env:
          GITEA_E2E_TAG_PREFIX: ${{ matrix.tag_prefix }}
        run: npm run test:integration
