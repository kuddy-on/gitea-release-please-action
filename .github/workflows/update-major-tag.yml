name: Update major version tag

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  update-major-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Move major version tag
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "${VERSION_TAG}" =~ ^v([0-9]+)\.[0-9]+\.[0-9]+$ ]]; then
            echo "Skipping non-stable version tag ${VERSION_TAG}."
            exit 0
          fi

          major_tag="v${BASH_REMATCH[1]}"
          target_sha="$(git rev-list -n 1 "${VERSION_TAG}")"
          git tag --force "${major_tag}" "${target_sha}"
          git push origin "refs/tags/${major_tag}" --force
